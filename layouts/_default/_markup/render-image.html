{{- $img := .Page.Resources.GetMatch .Destination -}}
{{- if not $img -}}
  {{- $img = .Page.Resources.GetMatch (printf "images/%s" .Destination) -}}
{{- end -}}
{{- if $img -}}
<img src="{{ $img.RelPermalink }}" alt="{{ .PlainText }}"{{ with .Title }} title="{{ . }}"{{ end }}>
{{- else -}}
<img src="{{ .Destination | safeURL }}" alt="{{ .PlainText }}"{{ with .Title }} title="{{ . }}"{{ end }}>
{{- end -}}
