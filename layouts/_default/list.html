{{ define "main" }}
<div class="container">
  <div class="list-page">
    <h1>{{ .Title }}</h1>
    <ul class="post-list">
      {{ range .Pages.ByDate.Reverse }}
      <li>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
        {{ if not .Date.IsZero }}<span class="post-list-date">{{ partial "fecha.html" .Date }}</span>{{ end }}
      </li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
