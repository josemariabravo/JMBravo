{{ define "main" }}
<div class="container article-layout">
  <article class="post">
    <h1>{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
    <span class="post-date">{{ partial "fecha.html" .Date }}</span>
    {{ end }}
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
  {{ partial "sidebar.html" . }}
</div>
{{ end }}
