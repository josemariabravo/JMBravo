{{ define "main" }}
<div class="container">
  <article class="post">
    <h1>{{ .Title }}</h1>
    <p class="post-meta">
      {{ if not .Date.IsZero }}{{ partial "fecha.html" .Date }}{{ end }}
      {{ with .Params.etiqueta }} · <span class="actualizacion-etiqueta">{{ . }}</span>{{ end }}
    </p>
    <div class="post-content">
      {{ .Content }}
    </div>
    {{ partial "page-close.html" . }}
  </article>
</div>
{{ end }}
