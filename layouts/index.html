{{ define "main" }}
<div class="home-content">
  {{ .Content }}
</div>

<h2>últimas entradas</h2>
<ul class="post-list">
  {{ range first 5 (where .Site.RegularPages "Section" "posts") }}
  <li>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    {{ if not .Date.IsZero }}<span class="post-list-date">{{ .Date.Format "2006-01-02" }}</span>{{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
